<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#000000"/>

  <!-- Outer compass ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#001a00" stroke-width="1"/>

  <!-- N tick (dim) -->
  <line x1="16" y1="5" x2="16" y2="12" stroke="#252525" stroke-width="1.5" stroke-linecap="round"/>
  <!-- S tick (dim) -->
  <line x1="16" y1="20" x2="16" y2="27" stroke="#252525" stroke-width="1.5" stroke-linecap="round"/>
  <!-- W tick (dim) -->
  <line x1="5" y1="16" x2="12" y2="16" stroke="#252525" stroke-width="1.5" stroke-linecap="round"/>

  <!-- E arm (bright) -->
  <line x1="18" y1="16" x2="24" y2="16" stroke="#00ff00" stroke-width="2" stroke-linecap="round"/>
  <!-- E arrowhead -->
  <polygon points="29,16 23,13 23,19" fill="#00ff00"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#00ff00"/>
</svg>
